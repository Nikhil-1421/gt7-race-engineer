# Builds the double-clickable desktop apps. PyInstaller can't cross-compile,
# so each OS builds its own binary. Trigger: push a tag like v2.1.0, or run
# manually from the Actions tab (workflow_dispatch) to get artifacts.
name: build-desktop
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: GT7RaceEngineer-macOS.zip
          - os: windows-latest
            artifact: GT7RaceEngineer-Windows.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: bash packaging/build_macos.sh
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: packaging\build_windows.bat
      - name: Smoke test (headless boot + health check)
        shell: bash
        env:
          GT7_NO_UI: "1"
          PORT: "8345"
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            BIN="dist/GT7 Race Engineer.app/Contents/MacOS/GT7RaceEngineer"
          else
            BIN="dist/GT7RaceEngineer/GT7RaceEngineer.exe"
          fi
          "$BIN" & APP_PID=$!
          for i in $(seq 1 40); do
            curl -fsS http://127.0.0.1:8345/health && ok=1 && break || sleep 1
          done
          kill $APP_PID || true
          [ "${ok:-0}" = "1" ]
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
